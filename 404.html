<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 // SIGNAL LOST</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --bg-dark: #0a0a0c;
            --grid-color: rgba(0, 243, 255, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: var(--neon-blue);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Cyber Grid Background */
        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            bottom: -50%;
            animation: grid-move 20s linear infinite;
            z-index: 1;
        }

        @keyframes grid-move {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .container {
            text-align: center;
            z-index: 2;
            position: relative;
        }

        /* Glitch Effect */
        .glitch {
            font-size: 8rem;
            font-weight: bold;
            position: relative;
            text-shadow: 0.05em 0 0 var(--neon-pink), -0.05em -0.025em 0 var(--neon-blue);
            animation: glitch 1s infinite;
        }

        .glitch::before, .glitch::after {
            content: "404";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 0 red, -2px 0 0 blue; }
            20% { text-shadow: -2px 0 0 red, 2px 0 0 blue; }
            40% { text-shadow: 2px 2px 0 red, -2px -2px 0 blue; }
            60% { text-shadow: -2px -2px 0 red, 2px 2px 0 blue; }
            80% { text-shadow: 2px -2px 0 red, -2px 2px 0 blue; }
            100% { text-shadow: 2px 0 0 red, -2px 0 0 blue; }
        }

        h2 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 0;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        p {
            color: #888;
            margin-bottom: 30px;
        }

        /* Cyber Button */
        .btn {
            padding: 15px 30px;
            border: 2px solid var(--neon-blue);
            background: transparent;
            color: var(--neon-blue);
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s;
            position: relative;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--neon-blue);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 3;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0, 243, 255, 0.1) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 6s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100%; }
        }
    </style>
</head>
<body>

    <div class="grid"></div>
    <div class="scanline"></div>

    <div class="container">
        <div class="glitch">404</div>
        <h2>Connection Terminated</h2>
        <p>The coordinate you are looking for does not exist in this sector.</p>
        <a href="/index.html" class="btn">Return to page</a>
    </div>

</body>
</html>
